{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h2 class="page-title mb-3">{{ title }}</h2>

            <form method="post">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-success">
                    Save
                </button>

                <a href="{% url 'dashboard_slots' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
