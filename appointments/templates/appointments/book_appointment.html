{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h2 class="page-title mb-3">Book Appointment</h2>

            <p>
                <strong>Doctor:</strong>
                Dr {{ slot.doctor.first_name }} {{ slot.doctor.last_name }}
            </p>

            <p>
                <strong>Date:</strong> {{ slot.date }}
            </p>

            <p>
                <strong>Time:</strong>
                {{ slot.start_time }} - {{ slot.end_time }}
            </p>

            <form method="post">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-success">
                    Confirm Booking
                </button>

                <a href="{% url 'slot_list' %}" class="btn btn-secondary">
                    Back
                </a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
