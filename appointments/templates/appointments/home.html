{% extends "base.html" %}

{% block content %}

<div class="card p-5 text-center">
    <h1 class="page-title">Welcome to Piki Ora Medical Centre</h1>

    <p class="lead mt-3">
        Book and manage doctor appointments online.
    </p>

    {% if user.is_authenticated %}
        <p>Hello, {{ user.first_name|default:user.username }}.</p>
        <a href="{% url 'slot_list' %}" class="btn btn-primary">Book an Appointment</a>
    {% else %}
        <a href="{% url 'register' %}" class="btn btn-primary">Register as Patient</a>
        <a href="{% url 'login' %}" class="btn btn-outline-primary">Login</a>
    {% endif %}
</div>

{% endblock %}
