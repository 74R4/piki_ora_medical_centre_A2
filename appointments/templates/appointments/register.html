{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h2 class="page-title mb-3">Patient Registration</h2>

            <form method="post">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-primary">
                    Create Account
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
